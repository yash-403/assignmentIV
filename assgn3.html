<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HW_III Vega-Lite Visualizations</title>
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      max-width: 1500px;
      margin: auto;
      padding: 30px;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 30px;
      font-size: 28px;
    }
    #vis {
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <h1>📊 HW_III — Vega-Lite Multiview Dashboard</h1>
  <div id="vis"></div>

  <script>
    const spec = {

      "data": {

          {"OrderDate":"2021-01-06","Region":"East","Rep":"Jones","Item":"Pencil","Units":95,"UnitCost":1.99,"Total":189.05},

          {"OrderDate":"2021-07-12","Region":"East","Rep":"Howard","Item":"Binder","Units":29,"UnitCost":1.99,"Total":57.71},
          {"OrderDate":"2021-07-29","Region":"East","Rep":"Parent","Item":"Binder","Units":81,"UnitCost":19.99,"Total":1619.19},
          {"OrderDate":"2021-08-15","Region":"East","Rep":"Jones","Item":"Pencil","Units":35,"UnitCost":4.99,"Total":174.65},
          {"OrderDate":"2021-09-01","Region":"Central","Rep":"Smith","Item":"Desk","Units":2,"UnitCost":125.00,"Total":250.00},
          {"OrderDate":"2021-09-18","Region":"East","Rep":"Jones","Item":"Pen Set","Units":16,"UnitCost":15.99,"Total":255.84},
          {"OrderDate":"2021-10-05","Region":"Central","Rep":"Morgan","Item":"Binder","Units":28,"UnitCost":8.99,"Total":251.72},
          {"OrderDate":"2021-10-22","Region":"East","Rep":"Jones","Item":"Pen","Units":64,"UnitCost":8.99,"Total":575.36},
          {"OrderDate":"2021-11-08","Region":"East","Rep":"Parent","Item":"Pen","Units":15,"UnitCost":19.99,"Total":299.85},
          {"OrderDate":"2021-11-25","Region":"Central","Rep":"Kivell","Item":"Pen Set","Units":96,"UnitCost":4.99,"Total":479.04},
          {"OrderDate":"2021-12-12","Region":"Central","Rep":"Smith","Item":"Pencil","Units":67,"UnitCost":1.29,"Total":86.43},
          {"OrderDate":"2021-12-29","Region":"East","Rep":"Parent","Item":"Pen Set","Units":74,"UnitCost":15.99,"Total":1183.26},
          {"OrderDate":"2022-01-15","Region":"Central","Rep":"Gill","Item":"Binder","Units":46,"UnitCost":8.99,"Total":413.54},
          {"OrderDate":"2022-02-01","Region":"Central","Rep":"Smith","Item":"Binder","Units":87,"UnitCost":15.00,"Total":1305.00},
          {"OrderDate":"2022-02-18","Region":"East","Rep":"Jones","Item":"Binder","Units":4,"UnitCost":4.99,"Total":19.96},
          {"OrderDate":"2022-03-07","Region":"West","Rep":"Sorvino","Item":"Binder","Units":7,"UnitCost":19.99,"Total":139.93},
          {"OrderDate":"2022-03-24","Region":"Central","Rep":"Jardine","Item":"Pen Set","Units":50,"UnitCost":4.99,"Total":249.50},
          {"OrderDate":"2022-04-10","Region":"Central","Rep":"Andrews","Item":"Pencil","Units":66,"UnitCost":1.99,"Total":131.34},
          {"OrderDate":"2022-04-27","Region":"East","Rep":"Howard","Item":"Pen","Units":96,"UnitCost":4.99,"Total":479.04},
          {"OrderDate":"2022-05-14","Region":"Central","Rep":"Gill","Item":"Pencil","Units":53,"UnitCost":1.29,"Total":68.37},
          {"OrderDate":"2022-05-31","Region":"Central","Rep":"Gill","Item":"Binder","Units":80,"UnitCost":8.99,"Total":719.20},
          {"OrderDate":"2022-06-17","Region":"Central","Rep":"Kivell","Item":"Desk","Units":5,"UnitCost":125.00,"Total":625.00},

          {"OrderDate":"2022-08-24","Region":"West","Rep":"Sorvino","Item":"Desk","Units":3,"UnitCost":275.00,"Total":825.00},
          {"OrderDate":"2022-09-10","Region":"Central","Rep":"Gill","Item":"Pencil","Units":7,"UnitCost":1.29,"Total":9.03},
          {"OrderDate":"2022-09-27","Region":"West","Rep":"Sorvino","Item":"Pen","Units":76,"UnitCost":1.99,"Total":151.24},
          {"OrderDate":"2022-10-14","Region":"West","Rep":"Thompson","Item":"Binder","Units":57,"UnitCost":19.99,"Total":1139.43},
          {"OrderDate":"2022-10-31","Region":"Central","Rep":"Andrews","Item":"Pencil","Units":14,"UnitCost":1.29,"Total":18.06},
          {"OrderDate":"2022-11-17","Region":"Central","Rep":"Jardine","Item":"Binder","Units":11,"UnitCost":4.99,"Total":54.89},
          {"OrderDate":"2022-12-04","Region":"Central","Rep":"Jardine","Item":"Binder","Units":94,"UnitCost":19.99,"Total":1879.06},
          {"OrderDate":"2022-12-21","Region":"Central","Rep":"Andrews","Item":"Binder","Units":28,"UnitCost":4.99,"Total":139.72}
        ]
      },
      "vconcat": [
        {
          "title": {"text": "━━━ Row 1: Donut Chart & Streamgraph ━━━", "anchor": "middle", "fontSize": 14, "color": "#7f8c8d"},
          "hconcat": [
            {
              "title": {"text": "1️⃣ Donut Chart: Rep vs Total Sales", "fontSize": 15},
              "width": 320,
              "height": 320,
              "mark": {"type": "arc", "innerRadius": 80, "stroke": "#fff", "strokeWidth": 2},
              "encoding": {
                "theta": {"field": "Total", "type": "quantitative", "aggregate": "sum"},
                "color": {
                  "field": "Rep",
                  "type": "nominal",
                  "scale": {"scheme": "tableau20"},
                  "legend": {"title": "Sales Rep", "orient": "right"}
                },
                "tooltip": [
                  {"field": "Rep", "type": "nominal", "title": "Sales Rep"},
                  {"field": "Total", "type": "quantitative", "aggregate": "sum", "format": "$,.2f", "title": "Total Revenue"}
                ]
              }
            },
            {
              "title": {"text": "2️⃣ Streamgraph: Total Over Time by Item", "fontSize": 15},
              "width": 550,
              "height": 320,
              "mark": {"type": "area", "interpolate": "basis", "opacity": 0.85},
              "encoding": {
                "x": {
                  "field": "OrderDate",
                  "type": "temporal",
                  "title": "Order Date",
                  "axis": {"format": "%b %Y", "labelAngle": -45}
                },
                "y": {
                  "field": "Total",
                  "type": "quantitative",
                  "aggregate": "sum",
                  "stack": "center",
                  "title": null,
                  "axis": null
                },
                "color": {
                  "field": "Item",
                  "type": "nominal",
                  "scale": {"scheme": "set2"},
                  "legend": {"title": "Item"}
                },
                "tooltip": [
                  {"field": "Item", "type": "nominal"},
                  {"field": "OrderDate", "type": "temporal", "title": "Date", "format": "%b %d, %Y"},
                  {"field": "Total", "type": "quantitative", "aggregate": "sum", "format": "$,.2f"}
                ]
              }
            }
          ]
        },
        {
          "title": {"text": "━━━ Row 2: Trellis Histogram with Mean Overlay ━━━", "anchor": "middle", "fontSize": 14, "color": "#7f8c8d"},
          "columns": 5,
          "facet": {"field": "Item", "type": "nominal", "title": "Item Category"},
          "spec": {
            "width": 170,
            "height": 160,
            "layer": [
              {
                "mark": {"type": "bar", "opacity": 0.75, "color": "#3498db", "cornerRadiusTopLeft": 3, "cornerRadiusTopRight": 3},
                "encoding": {
                  "x": {"field": "Units", "type": "quantitative", "bin": {"maxbins": 8}, "title": "Units"},
                  "y": {"aggregate": "count", "type": "quantitative", "title": "Frequency"}
                }
              },
              {
                "mark": {"type": "rule", "color": "#e74c3c", "size": 3, "strokeDash": [6, 3]},
                "encoding": {
                  "x": {"field": "Units", "type": "quantitative", "aggregate": "mean"},
                  "tooltip": [{"field": "Units", "aggregate": "mean", "type": "quantitative", "title": "Mean Units", "format": ".1f"}]
                }
              },
              {
                "mark": {"type": "text", "align": "left", "dx": 5, "dy": -80, "color": "#e74c3c", "fontSize": 11, "fontWeight": "bold"},
                "encoding": {
                  "x": {"field": "Units", "type": "quantitative", "aggregate": "mean"},
                  "text": {"field": "Units", "aggregate": "mean", "type": "quantitative", "format": ".1f"}
                }
              }
            ]
          }
        },
        {
          "title": {"text": "━━━ Row 3: Custom Interactive Visualizations ━━━", "anchor": "middle", "fontSize": 14, "color": "#7f8c8d"},
          "hconcat": [
            {
              "title": {"text": "4️⃣ Linked Drill-Down: Click a Region → See Rep Breakdown", "fontSize": 14},
              "vconcat": [
                {
                  "width": 400,
                  "height": 180,
                  "params": [
                    {
                      "name": "regionClick",
                      "select": {"type": "point", "fields": ["Region"], "on": "click"},
                      "bind": "legend"
                    }
                  ],
                  "mark": {
                    "type": "bar",
                    "cornerRadiusTopLeft": 5,
                    "cornerRadiusTopRight": 5,
                    "cursor": "pointer"
                  },
                  "encoding": {
                    "x": {"field": "Region", "type": "nominal", "title": "Region", "axis": {"labelFontSize": 13}},
                    "y": {"field": "Total", "type": "quantitative", "aggregate": "sum", "title": "Total Revenue ($)"},
                    "color": {
                      "condition": {
                        "param": "regionClick",
                        "field": "Region",
                        "type": "nominal",
                        "scale": {"domain": ["East", "Central", "West"], "range": ["#e74c3c", "#3498db", "#2ecc71"]}
                      },
                      "value": "#bdc3c7"
                    },
                    "tooltip": [
                      {"field": "Region", "type": "nominal"},
                      {"field": "Total", "aggregate": "sum", "type": "quantitative", "format": "$,.2f"}
                    ]
                  }
                },
                {
                  "width": 400,
                  "height": 200,
                  "transform": [{"filter": {"param": "regionClick"}}],
                  "mark": {
                    "type": "bar",
                    "cornerRadiusTopLeft": 4,
                    "cornerRadiusTopRight": 4
                  },
                  "encoding": {
                    "y": {"field": "Rep", "type": "nominal", "title": "Sales Rep", "sort": "-x"},
                    "x": {"field": "Total", "type": "quantitative", "aggregate": "sum", "title": "Revenue ($)"},
                    "color": {
                      "field": "Item",
                      "type": "nominal",
                      "scale": {"scheme": "set2"},
                      "legend": {"title": "Item"}
                    },
                    "tooltip": [
                      {"field": "Rep", "type": "nominal"},
                      {"field": "Item", "type": "nominal"},
                      {"field": "Total", "aggregate": "sum", "type": "quantitative", "format": "$,.2f"},
                      {"field": "Units", "aggregate": "sum", "type": "quantitative", "title": "Units Sold"}
                    ]
                  }
                }
              ]
            },
            {
              "title": {"text": "5️⃣ Brush Scatter → Linked Distribution Below", "fontSize": 14},
              "vconcat": [
                {
                  "width": 420,
                  "height": 200,
                  "params": [
                    {
                      "name": "brush",
                      "select": {"type": "interval", "encodings": ["x"]}
                    }
                  ],
                  "mark": {"type": "point", "filled": true, "size": 100, "opacity": 0.8},
                  "encoding": {
                    "x": {"field": "OrderDate", "type": "temporal", "title": "Order Date", "axis": {"format": "%b %Y", "labelAngle": -45}},
                    "y": {"field": "Total", "type": "quantitative", "title": "Total ($)"},
                    "color": {
                      "condition": {
                        "param": "brush",
                        "field": "Item",
                        "type": "nominal",
                        "scale": {"scheme": "dark2"}
                      },
                      "value": "lightgray"
                    },
                    "shape": {"field": "Region", "type": "nominal"},
                    "size": {
                      "condition": {"param": "brush", "value": 150},
                      "value": 40
                    },
                    "tooltip": [
                      {"field": "Rep", "type": "nominal"},
                      {"field": "Item", "type": "nominal"},
                      {"field": "Region", "type": "nominal"},
                      {"field": "Units", "type": "quantitative"},
                      {"field": "Total", "type": "quantitative", "format": "$,.2f"},
                      {"field": "OrderDate", "type": "temporal", "format": "%b %d, %Y"}
                    ]
                  }
                },
                {
                  "width": 420,
                  "height": 160,
                  "transform": [{"filter": {"param": "brush"}}],
                  "mark": {"type": "bar", "opacity": 0.8, "cornerRadiusTopLeft": 3, "cornerRadiusTopRight": 3},
                  "encoding": {
                    "x": {"field": "Item", "type": "nominal", "title": "Item", "axis": {"labelFontSize": 12}},
                    "y": {"field": "Total", "type": "quantitative", "aggregate": "sum", "title": "Filtered Total ($)"},
                    "color": {"field": "Item", "type": "nominal", "scale": {"scheme": "dark2"}, "legend": null},
                    "tooltip": [
                      {"field": "Item", "type": "nominal"},
                      {"field": "Total", "aggregate": "sum", "type": "quantitative", "format": "$,.2f", "title": "Total in Selection"},
                      {"field": "Units", "aggregate": "sum", "type": "quantitative", "title": "Units in Selection"}
                    ]
                  }
                }
              ]
            }
          ]
        }
      ],
      "config": {
        "title": {"fontSize": 15, "font": "Segoe UI"},
        "axis": {"labelFontSize": 11, "titleFontSize": 13, "grid": true, "gridOpacity": 0.15},
        "legend": {"labelFontSize": 11, "titleFontSize": 12},
        "view": {"stroke": null},
        "background": "white"
      }
    };

    vegaEmbed('#vis', spec, {
      actions: {export: true, source: false, compiled: false, editor: true},
      renderer: 'canvas'
    }).catch(console.error);
  </script>
</body>
</html>
